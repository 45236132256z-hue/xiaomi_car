<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽車比較</title>
    <style>
        body { font-family: sans-serif; background-color: #ffffff; color: #000000; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 2.2rem; margin-bottom: 30px; }
        .selection-box { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        select { padding: 8px 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 16px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background-color: #f2f2f2; font-weight: bold; }
        td:first-child { font-weight: bold; background-color: #fafafa; width: 20%; }
    </style>
</head>
<body>

<div class="container">
    <h1>汽車比較工具</h1>
    
    <form action="/compare" method="post" class="selection-box">
        <label for="car1">車輛 1：</label>
        <select name="car1" id="car1">
            <option value="">請選擇...</option>
            {% for id, car in cars.items() %}
                <option value="{{ id }}">{{ car.name }}</option>
            {% endfor %}
        </select>

        <label for="car2">車輛 2：</label>
        <select name="car2" id="car2">
            <option value="">請選擇...</option>
            {% for id, car in cars.items() %}
                <option value="{{ id }}">{{ car.name }}</option>
            {% endfor %}
        </select>
        
        <button type="submit">比較</button>
    </form>

    {% if car1 and car2 %}
    <h2>比較結果</h2>
    <table>
        <thead>
            <tr>
                <th>屬性</th>
                <th>{{ car1.name }}</th>
                <th>{{ car2.name }}</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>價格</td>
                <td>{{ car1.price }}</td>
                <td>{{ car2.price }}</td>
            </tr>
            <tr>
                <td>引擎</td>
                <td>{{ car1.engine }}</td>
                <td>{{ car2.engine }}</td>
            </tr>
            <tr>
                <td>馬力</td>
                <td>{{ car1.horsepower }}</td>
                <td>{{ car2.horsepower }}</td>
            </tr>
            <tr>
                <td>油耗</td>
                <td>{{ car1.fuel_consumption }}</td>
                <td>{{ car2.fuel_consumption }}</td>
            </tr>
        </tbody>
    </table>
    {% endif %}
</div>

</body>
</html>
